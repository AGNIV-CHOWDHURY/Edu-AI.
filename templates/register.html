{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block extra_head %}
<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.auth-card {
  width: 100%;
  max-width: 440px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.5rem;
  backdrop-filter: blur(20px);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.auth-logo { text-align: center; margin-bottom: 2rem; }
.auth-logo-icon {
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent2), var(--accent3));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem;
  box-shadow: 0 8px 32px rgba(139,92,246,0.3);
}
.auth-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.3rem; }
.auth-sub { color: var(--text3); font-size: 0.875rem; }
.auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text3); }
.auth-footer a { color: var(--accent); text-decoration: none; }
.strength-bar { height: 4px; border-radius: 99px; margin-top: 0.4rem; transition: all 0.3s; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M14 4v20M4 14h20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">Join EduAI to manage your students</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" name="name" class="form-control" placeholder="Dr. Jane Smith" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="teacher@school.edu" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" id="pwd" class="form-control" placeholder="Min. 6 characters" oninput="checkStrength(this.value)" required>
        <div class="strength-bar" id="strengthBar"></div>
        <p class="form-hint" id="strengthText"></p>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Create account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function checkStrength(val) {
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  if (val.length === 0) { bar.style.width = '0'; return; }
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { color: '#ff6b6b', label: 'Weak', w: '25%' },
    { color: '#ffd166', label: 'Fair', w: '50%' },
    { color: '#6c8eff', label: 'Good', w: '75%' },
    { color: '#06d6a0', label: 'Strong', w: '100%' },
  ];
  const idx = Math.min(Math.floor(score / 1.4), 3);
  bar.style.background = levels[idx].color;
  bar.style.width = levels[idx].w;
  text.textContent = levels[idx].label;
  text.style.color = levels[idx].color;
}
</script>
{% endblock %}
