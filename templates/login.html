{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block extra_head %}
<style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.auth-card {
  width: 100%;
  max-width: 420px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.5rem;
  backdrop-filter: blur(20px);
  animation: fadeUp 0.5s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.auth-logo {
  text-align: center;
  margin-bottom: 2rem;
}
.auth-logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
  box-shadow: 0 8px 32px rgba(108,142,255,0.3);
}
.auth-title {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 0.3rem;
}
.auth-sub { color: var(--text3); font-size: 0.875rem; }
.auth-footer {
  text-align: center;
  margin-top: 1.5rem;
  font-size: 0.85rem;
  color: var(--text3);
}
.auth-footer a { color: var(--accent); text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
.password-wrap { position: relative; }
.password-toggle {
  position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
  cursor: pointer; color: var(--text3); background: none; border: none;
  padding: 0; transition: color 0.2s;
}
.password-toggle:hover { color: var(--text); }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path d="M7 14L11 18L21 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your EduAI account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" placeholder="teacher@school.edu" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="pwd" class="form-control" placeholder="••••••••" required>
          <button type="button" class="password-toggle" onclick="togglePwd()">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
        Sign in →
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
    </div>

    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,0.07);text-align:center;">
      <a href="{{ url_for('student_login') }}" style="display:inline-flex;align-items:center;gap:0.5rem;color:var(--text3);font-size:0.82rem;text-decoration:none;padding:0.5rem 1rem;border:1px solid rgba(255,255,255,0.08);border-radius:10px;transition:all 0.2s;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        Student? Login to your portal
      </a>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd() {
  const pwd = document.getElementById('pwd');
  pwd.type = pwd.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
